<script>
// URL FIJA DE TU SCRIPT
const URL_FIJA = "https://script.google.com/macros/s/AKfycbwinsK28zjth1C5bMzOIwfy4Ifaqdc-awxLwv7XLsIqh7q-P6Sy7egWGux4MR1FQzp3/exec";

async function connectGAS() {
  const statusEl = document.getElementById('gasStatus');
  const progSection = document.getElementById('progSection');
  
  progSection.style.display = 'block';
  statusEl.innerText = "Conectando...";
  document.getElementById('progBarFill').style.width = "40%";

  try {
    const response = await fetch(URL_FIJA, { method: 'GET', redirect: 'follow' });
    const data = await response.json();

    if (data.cursos) {
      window.DASH_DATA = data.cursos;
      document.getElementById('progBarFill').style.width = "100%";
      statusEl.innerText = "¡Datos en línea!";
      statusEl.className = "status-badge sc-ok";
      
      // Aquí el script llama a tus funciones originales para dibujar los gráficos
      renderOriginalDashboard(data.cursos); 
      
      setTimeout(() => { progSection.style.display = 'none'; }, 2000);
    }
  } catch (e) {
    statusEl.innerText = "Error de conexión";
    statusEl.className = "status-badge sc-err";
    console.error(e);
  }
}

}

window.onload = connectGAS;
</script>
